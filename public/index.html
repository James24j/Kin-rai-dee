<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>อีสอะไรดีจ้าเพื่อนยาก</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* เปลี่ยนสีพื้นหลังให้ดูสดใสเข้ากับเรื่องของกิน (โทนส้ม-เหลืองอ่อน) */
body {
    font-family: 'Kanit', sans-serif;
    background: linear-gradient(135deg, #fff0dc 0%, #ffdfb9 100%); 
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #333;
}

/* อัปเกรดกล่อง UI ให้เป็นทรงการ์ด 3 มิติ ลอยขึ้นมา */
.box-ui {
    background: #ffffff;
    border-radius: 24px;
    padding: 40px 30px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08), 
                0 1px 8px rgba(0, 0, 0, 0.04);
    text-align: center;
    transition: transform 0.3s ease;
}

/* ทำให้ปุ่มเปิด Google Maps สีสวยสะดุดตา และมีเอฟเฟกต์ตอนชี้เมาส์ */
button {
    background: linear-gradient(135deg, #ff6b6b, #ff4757);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 15px 30px;
    font-size: 1.2rem;
    font-family: 'Kanit', sans-serif;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
    box-shadow: 0 8px 15px rgba(255, 71, 87, 0.3);
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 20px rgba(255, 71, 87, 0.4);
}

button:active {
    transform: translateY(1px);
}

/* ตกแต่งชื่อร้านให้ตัวใหญ่และโดดเด่น */
h2 {
    color: #ff4757;
    font-size: 2.5rem;
    margin: 15px 0;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}
    </style>
</head>
<body>

    <div id="setup" class="box-ui">
        <h1>🍽️ อีสอะไรดีจ้าเพื่อนยาก</h1>
        <p>สร้างหรือใส่รหัสห้องเพื่อเริ่มโหวต</p>
        <input type="text" id="roomCode" placeholder="ใส่รหัสห้อง เช่น 9999">
        <button class="btn-primary" onclick="joinRoom()">เข้าห้องเลย!</button>
    </div>

    <div id="category-vote" class="box-ui">
        <h2>เลือกแหน่จ้า</h2>
        <p>วันนี้อยากอีสข้าว หรือ อีสเส้น?</p>
        <button class="cat-btn btn-rice" onclick="submitCategoryVote('rice')">🍚 สายข้าว</button>
        <button class="cat-btn btn-noodle" onclick="submitCategoryVote('noodle')">🍜 สายเส้น</button>
    </div>

    <div id="waiting" class="box-ui">
        <h2>⏳ รอเพื่อนแป๊บนะ มันลีลางี้แหละ...</h2>
        <p>กำลังรวบรวมเสียงในสภาว่าตกลงจะข้าวหรือเส้น</p>
    </div>

    <div id="game">
        <div class="status-bar" id="statusText">รอโหลดเมนู...</div>
        <div id="card-container"></div>
        <div class="action-buttons">
            <button class="btn-circle btn-nope" onclick="manualSwipe('left')">❌</button>
            <button class="btn-circle btn-like" onclick="manualSwipe('right')">💚</button>
        </div>
    </div>

    <div id="result" class="box-ui">
        <div id="winnerText">
            <h2>กำลังรอเพื่อนรักโหวต... ⏳</h2>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = '';
        let items = [];
        let currentIndex = 0;
        let currentCardElement = null;

        // สลับหน้าจอ
        function showScreen(screenId) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('category-vote').style.display = 'none';
            document.getElementById('waiting').style.display = 'none';
            document.getElementById('game').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            
            document.getElementById(screenId).style.display = (screenId === 'game') ? 'flex' : 'block';
        }

        function joinRoom() {
            currentRoom = document.getElementById('roomCode').value;
            if(currentRoom) {
                socket.emit('joinRoom', currentRoom);
            }
        }

        // เซิร์ฟเวอร์สั่งให้เริ่มโหวตหมวดหมู่
        socket.on('startCategoryVote', () => {
            showScreen('category-vote');
        });

        // ส่งผลโหวตหมวดหมู่
        function submitCategoryVote(category) {
            socket.emit('voteCategory', { roomCode: currentRoom, category: category });
            showScreen('waiting'); // เปลี่ยนไปหน้ารอเพื่อน
        }

        // เซิร์ฟเวอร์ได้มติแล้ว ส่งเมนูมาให้เริ่มปัดการ์ด
        socket.on('startGame', (data) => {
            items = data.items;
            const categoryName = data.category === 'rice' ? 'ข้าว 🍚' : 'เส้น 🍜';
            currentIndex = 0;
            
            showScreen('game');
            // เปลี่ยนข้อความบอกว่ากำลังโหวตหมวดไหนอยู่
            document.getElementById('statusText').innerText = `รอบชิง: หมวด${categoryName}`;
            setTimeout(renderCard, 500); // ดีเลย์นิดนึงให้ UI เตรียมตัว
        });

        function renderCard() {
            const container = document.getElementById('card-container');
            container.innerHTML = ''; 

            if (currentIndex >= items.length) {
                showScreen('result');
                socket.emit('finishVoting', currentRoom);
                return;
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.style.backgroundImage = `url('${items[currentIndex].image}')`;
            
            const title = document.createElement('div');
            title.className = 'card-title';
            title.innerText = items[currentIndex].name; 

            card.appendChild(title);
            container.appendChild(card);
            currentCardElement = card;

            let startX = 0;
            let currentX = 0;

            card.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                card.style.transition = 'none'; 
            });

            card.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX - startX;
                card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.05}deg)`; 
            });

            card.addEventListener('touchend', () => {
                card.style.transition = 'transform 0.3s ease'; 
                if (currentX > 100) {
                    processSwipe('right');
                } else if (currentX < -100) {
                    processSwipe('left');
                } else {
                    card.style.transform = `translateX(0px) rotate(0deg)`;
                }
            });
        }

        function manualSwipe(direction) {
            if(!currentCardElement) return;
            processSwipe(direction);
        }

        function processSwipe(direction) {
            if(!currentCardElement) return;
            
            if (direction === 'right') {
                currentCardElement.style.transform = `translateX(500px) rotate(30deg)`;
                socket.emit('swipeRight', { roomCode: currentRoom, item: items[currentIndex] });
            } else {
                currentCardElement.style.transform = `translateX(-500px) rotate(-30deg)`;
            }
            
            currentCardElement = null; 
            setTimeout(nextCard, 300);
        }

        function nextCard() {
            currentIndex++;
            renderCard();
            if(currentIndex < items.length) {
                // อัปเดตบอกจำนวนข้อ
                const catText = document.getElementById('statusText').innerText.split('(')[0];
                document.getElementById('statusText').innerText = `${catText} (${currentIndex + 1}/${items.length})`;
            }
        }

        socket.on('result', (data) => {
            if(data.maxVotes > 0) {
                document.getElementById('winnerText').innerHTML = `
                    <h2 style="color:#555;">🎉 กกต.เคาะแล้ว! ไปอีส:</h2>
                    <div class="winner-text">${data.winner}</div>
                    <p style="color:#888; margin-bottom: 25px;">(มีคนอยากกิน ${data.maxVotes} คน)</p>
                    <a href="${data.mapUrl}" target="_blank" class="btn-primary" style="margin-top: 10px;">
                        📍 เปิด Google Maps นำทาง
                    </a>
                `;
            } else {
                document.getElementById('winnerText').innerHTML = `<h2>😅 ไม่มีใครอยากอีสอะไรเลย กลับห้องไปเล่นไพ่จ้า!</h2>`;
            }
        });
    </script>
</body>
</html>
