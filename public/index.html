<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>อีสอะไรดีจ้าเพื่อนรัก</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- สีพื้นหลังและฟอนต์ --- */
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fff0dc 0%, #ffdfb9 100%); 
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            overflow: hidden; /* กันหน้าจอมันเลื่อนตอนปัดไพ่ */
        }

        /* --- กล่อง UI แบบ Glassmorphism มีมิติ --- */
        .box-ui {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.6);
            /* แอนิเมชันเด้งดึ๋งตอนโหลดขึ้นมา */
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- ตกแต่งปุ่มต่างๆ --- */
        button {
            transition: all 0.2s ease;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 8px 15px rgba(255, 71, 87, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 20px rgba(255, 71, 87, 0.4);
        }
        .btn-primary:active { transform: translateY(1px); }

        .cat-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.3rem;
            border: none;
            border-radius: 15px;
            margin-top: 15px;
            font-weight: bold;
            color: white;
        }
        .btn-rice { background: linear-gradient(135deg, #f6d365, #fda085); box-shadow: 0 8px 15px rgba(253, 160, 133, 0.3); }
        .btn-noodle { background: linear-gradient(135deg, #84fab0, #8fd3f4); box-shadow: 0 8px 15px rgba(143, 211, 244, 0.3); color: #333; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #ddd;
            font-size: 1.1rem;
            font-family: 'Kanit', sans-serif;
            box-sizing: border-box;
            margin-top: 15px;
            text-align: center;
        }
        input:focus { border-color: #ff4757; outline: none; }

        h2 { color: #ff4757; font-size: 2.2rem; margin: 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        /* --- หน้าจอ Game ปัดการ์ด --- */
        #game {
            width: 100%;
            height: 100vh;
            display: none; /* ซ่อนไว้ก่อน จะกลายเป็น flex ตอนเล่น */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-bar {
            position: absolute;
            top: 20px;
            background: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        #card-container {
            width: 300px;
            height: 420px;
            position: relative;
            margin-top: 20px;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: absolute;
            background-color: white;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            display: flex;
            align-items: flex-end;
            overflow: hidden;
            transform-origin: 50% 100%;
        }

        .card::after { /* ทำเงาดำๆ ข้างล่างการ์ดให้ตัวหนังสืออ่านง่ายขึ้น */
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .card-title {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 20px;
            width: 100%;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .action-buttons {
            display: flex;
            gap: 40px;
            margin-top: 30px;
            z-index: 10;
        }

        .btn-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 2rem;
            border: none;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-nope { color: #ff4757; }
        .btn-like { color: #2ed573; }
        .btn-circle:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="setup" class="box-ui">
        <h1>🍽️ อีสอะไรดีจ้าเพื่อนรัก</h1>
        <p>สร้างหรือใส่รหัสห้องเพื่อเริ่มโหวต</p>
        <input type="text" id="roomCode" placeholder="ใส่รหัสห้อง เช่น 9999">
        <button class="btn-primary" onclick="joinRoom()">เข้าห้องมาจ้า!</button>
    </div>

    <div id="category-vote" class="box-ui" style="display: none;">
        <h2>เลือกแหน่จ้า</h2>
        <p>วันนี้อยากอีสข้าว หรือ สูดเส้น?</p>
        <button class="cat-btn btn-rice" onclick="submitCategoryVote('rice')">🍚 อีสข้าว</button>
        <button class="cat-btn btn-noodle" onclick="submitCategoryVote('noodle')">🍜 อีสเส้น</button>
    </div>

    <div id="waiting" class="box-ui" style="display: none;">
        <div id="waiting-content">
            <h2>⏳ รอเพื่อนแป๊บนะ มันก็ลีลาแบบนี้แหละ ปกติ...</h2>
            <p>กำลังรวบรวมเสียงในสภาว่าตกลงจะข้าวหรือเส้น</p>
        </div>
    </div>

    <div id="game" style="display: none;">
        <div class="status-bar" id="statusText">รอโหลดเมนูน้า...</div>
        <div id="card-container"></div>
        <div class="action-buttons">
            <button class="btn-circle btn-nope" onclick="manualSwipe('left')">❌</button>
            <button class="btn-circle btn-like" onclick="manualSwipe('right')">💚</button>
        </div>
    </div>

    <div id="result" class="box-ui" style="display: none;">
        <div id="winnerText">
            <h2>กำลังประมวลผลค่ะเพื่อนรัก... ⏳</h2>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = '';
        let items = [];
        let currentIndex = 0;
        let currentCardElement = null;
        let pendingGameData = null; // เก็บข้อมูลก่อนเริ่มเกม
        let pendingResultData = null; // เก็บข้อมูลก่อนโชว์ผล

        // ฟังก์ชันสลับหน้าจอ (บังคับซ่อนทุกหน้า แล้วเปิดเฉพาะหน้าที่ระบุ)
        function showScreen(screenId) {
            ['setup', 'category-vote', 'waiting', 'game', 'result'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });
            document.getElementById(screenId).style.display = (screenId === 'game') ? 'flex' : 'block';
        }

        function joinRoom() {
            currentRoom = document.getElementById('roomCode').value;
            if(currentRoom) {
                socket.emit('joinRoom', currentRoom);
            }
        }

        socket.on('startCategoryVote', () => {
            showScreen('category-vote');
        });

        function submitCategoryVote(category) {
            socket.emit('voteCategory', { roomCode: currentRoom, category: category });
            showScreen('waiting'); 
        }

        // ==========================================
        // 🛑 เพิ่มระบบต้องกดปุ่มก่อนเข้าหน้าเกม
        // ==========================================
        socket.on('startGame', (data) => {
            pendingGameData = data; 
            const categoryName = data.category === 'rice' ? 'ข้าว 🍚' : 'เส้น 🍜';
            
            // อัปเดตหน้า waiting ให้มีปุ่มกดเริ่มเกม
            document.getElementById('waiting-content').innerHTML = `
                <h2>🎉 ผลโหวตออกแล้ว!</h2>
                <p>สภาลงมติให้ไปอีส <b>หมวด${categoryName}</b></p>
                <button class="btn-primary" onclick="enterGame()">เริ่มปัดการ์ดหาของกิน 🚀</button>
            `;
        });

        function enterGame() {
            items = pendingGameData.items;
            const categoryName = pendingGameData.category === 'rice' ? 'ข้าว 🍚' : 'เส้น 🍜';
            currentIndex = 0;
            
            showScreen('game');
            document.getElementById('statusText').innerText = `รอบชิง: หมวด${categoryName}`;
            setTimeout(renderCard, 100); 
        }

        function renderCard() {
            const container = document.getElementById('card-container');
            container.innerHTML = ''; 

            if (currentIndex >= items.length) {
                // ==========================================
                // 🛑 เมื่อปัดครบ เปลี่ยนหน้าเกมเป็นหน้าจอรอผล
                // ==========================================
                document.getElementById('game').innerHTML = `
                    <div class="box-ui" style="display: block; margin: auto;">
                        <h2>🛑 ปัดครบแล้ว!</h2>
                        <p>กำลังรอเพื่อนคนอื่นปัดให้เสร็จ...</p>
                        <div id="readyResultBtn"></div>
                    </div>
                `;
                socket.emit('finishVoting', currentRoom);
                return;
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.style.backgroundImage = `url('${items[currentIndex].image}')`;
            
            const title = document.createElement('div');
            title.className = 'card-title';
            title.innerText = items[currentIndex].name; 

            card.appendChild(title);
            container.appendChild(card);
            currentCardElement = card;

            let startX = 0;
            let currentX = 0;

            card.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                card.style.transition = 'none'; 
            });

            card.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX - startX;
                card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.05}deg)`; 
            });

            card.addEventListener('touchend', () => {
                card.style.transition = 'transform 0.3s ease'; 
                if (currentX > 100) {
                    processSwipe('right');
                } else if (currentX < -100) {
                    processSwipe('left');
                } else {
                    card.style.transform = `translateX(0px) rotate(0deg)`;
                }
            });
        }

        function manualSwipe(direction) {
            if(!currentCardElement) return;
            processSwipe(direction);
        }

        function processSwipe(direction) {
            if(!currentCardElement) return;
            
            if (direction === 'right') {
                currentCardElement.style.transform = `translateX(500px) rotate(30deg)`;
                socket.emit('swipeRight', { roomCode: currentRoom, item: items[currentIndex] });
            } else {
                currentCardElement.style.transform = `translateX(-500px) rotate(-30deg)`;
            }
            
            currentCardElement = null; 
            setTimeout(nextCard, 300);
        }

        function nextCard() {
            currentIndex++;
            renderCard();
            if(currentIndex < items.length) {
                const catText = document.getElementById('statusText').innerText.split('(')[0];
                document.getElementById('statusText').innerText = `${catText} (${currentIndex + 1}/${items.length})`;
            }
        }

        socket.on('result', (data) => {
            if(data.maxVotes > 0) {
                document.getElementById('winnerText').innerHTML = `
                    <h2 style="color:#555;">🎉 กกต.เคาะแล้ว! ไปอีส:</h2>
                    <div class="winner-text">${data.winner}</div>
                    <p style="color:#888; margin-bottom: 25px;">(มีคนอยากกิน ${data.maxVotes} คน)</p>
                    <a href="${data.mapUrl}" target="_blank" class="btn-primary" style="margin-top: 10px;">
                        📍 เปิด Google Maps นำทาง
                    </a>
                `;
            } else {
                document.getElementById('winnerText').innerHTML = `<h2>😅 ไม่มีใครอยากอีสอะไรเลย กลับห้องไปเล่นไพ่จ้า!</h2>`;
            }
        });
    </script>
</body>
</html>
